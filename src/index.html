<html>

<head>
  <meta charSet="UTF-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <title>Youtube2Mp3</title>
  <link rel="stylesheet" href="styles/style.css">
  <script defer src="js/appFunctions.js"></script>
</head>

<body>
  <div class="mainApp">
    <div class="topBar">
      <div class="titleBar">
        <button id="showHideMenus" class="toggleButton"></button>
        <b><span>
            <div class="title" style="color: grey;">Youtube2mp3</div>
          </span></b>
      </div>
      <div class="titleBarBtns">
        <button id="minimizeBtn" class="topBtn minimizeBtn" title="Minimize"></button>
        <button id="maxResBtn" class="topBtn maximizeBtn" title="Maximize"></button>
        <button id="closeBtn" class="topBtn closeBtn" title="Close"></button>
      </div>
    </div>
    <div class="contentArea">
      <div id="mySidebar" class="leftMenu">
        <center>
          <br />
            <h1 style="color: rgb(190, 137, 242)">Information: </h1>
            <h4>This app that converts youtube</h4>
            <h4>videos into mp3 files.</h4>
          <br />
          <h1 style="color: rgb(233, 141, 128)">Example: </h1>
          <h4>What you need to paste:</h4>
          <img src="https://yt2mp3.is-an.app/example.png" height="20" />
          <br />
          <br />
          <br />
          <h1 style="color: rgb(242, 137, 240)">Credits: </h1>
          <h4>avlaynndev: Owner & Main Developer</h4>
          <br/>
          <br />  
          <h1 style="color: rgb(16, 191, 244)">Links: </h1>
              <a class="github-button" href="https://github.com/avalynndev/youtube2mp3"
                data-color-scheme="no-preference: light; light: light; dark: dark;" data-size="large" data-show-count="true"
                aria-label="Star avalynndev/youtube2mp3 on GitHub">Star</a>
                <br />
                <br />
                <a class="github-button" href="https://github.com/avalynndev"
                  data-color-scheme="no-preference: light; light: light; dark: dark;" data-size="large" data-show-count="true"
                  aria-label="Follow @avalynndev on GitHub">Follow @avalynndev</a>
        </center>
      </div>
      <div class="contentPages">
        <center>
        <input type="text" placeholder="Input your youtube url" name="URL" id="youtubelink" />
        <button type="button" onClick="myFunction()" id="download">
          Convert
        </button>
        <iframe id="buttonApi" src="" width="100%" height="100%"></iframe>
        <br />
        <p>⚠️ | If the MP3 file doesn't open, it means it is still downloading. So, be patient!! </p>
        </center>
      </div>
    </div>
  </div>
</body>

<script async defer src="https://buttons.github.io/buttons.js"></script>
<script>
  function myFunction() {
    let link = document.getElementById("youtubelink").value
    console.log(link)
    document.getElementById("buttonApi").setAttribute('src', "https://yt2mp3.co/api/button/mp3?url=" + link)
  }
</script>

</html>
